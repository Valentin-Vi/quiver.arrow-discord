schema: "arrow@v0"
  metadata:
    name: test-pkg
    description: Minimal test package arrow
    version: 1.0.0
    license: MIT
    maintainers:
      - name: test
  targets:
    "*":
      lifecycle:
        install:
          - type: run
            title: "Create marker file"
            command: "mkdir -p ~/.local/share/quiver-test && echo installed > ~/.local/share/quiver-test/pkg.txt"
        uninstall:
          - type: run
            title: "Remove marker file"
            command: "rm -f ~/.local/share/quiver-test/pkg.txt"
